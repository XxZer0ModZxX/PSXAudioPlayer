<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="mini-coi.js"></script> 
    <title>PSX CD Player - PS5 Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="audio-engine" playsinline preload="auto"></audio>

    <div id="start-overlay" style="z-index: 10000;">
        <div id="start-button">Tap to Power On PSX</div>
    </div>

    <div class="ps1-wrapper" id="main-ui">
        <div class="scaling-container">
            <img src="PSXPLAYER.png" class="background" alt="PSX UI">
            
            <div id="btn-next" class="hitbox circle" style="left: 23%; top: 7.5%;"></div>
            <div id="btn-ff" class="hitbox circle" style="left: 23%; top: 22.5%;"></div>
            <div id="btn-play" class="hitbox circle" style="left: 23%; top: 35.5%;"></div>
            <div id="btn-stop" class="hitbox circle" style="left: 23%; top: 49.5%;"></div>
            <div id="btn-pause" class="hitbox circle" style="left: 23%; top: 62.5%;"></div>
            <div id="btn-rw" class="hitbox circle" style="left: 23%; top: 76.5%;"></div>
            <div id="btn-prev" class="hitbox circle" style="left: 23%; top: 89.5%;"></div>

            <div id="btn-viz-toggle" class="hitbox circle" style="left: 44.5%; top: 21.5%;"></div>
            <div id="btn-open-bios" class="hitbox circle" style="left: 81%; top: 67%;"></div>
            <div id="btn-open" class="hitbox circle" style="left: 81%; top: 80.5%;"></div>
        </div>
    </div>

    <div id="visualizer-overlay" class="hidden">
        <canvas id="viz-canvas"></canvas>
        <div id="btn-exit-viz">Back to Player</div>
    </div>

    <script src="emulator-core/wasmpsx.min.js"></script>
    <script src="player.js"></script>
</body>
</html>
