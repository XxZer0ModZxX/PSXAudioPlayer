<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="mini-coi.js"></script> 
    <title>PSX CD Player - PS5 Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-overlay">
        <div id="start-button">Tap to Power On PSX</div>
    </div>

    <div class="ps1-wrapper" id="main-ui">
        <div class="scaling-container">
            <img src="PSXPLAYER.png" class="background" alt="PSX UI">
            <div id="btn-viz-toggle" class="hitbox circle" style="left: 43.3%; top: 21.9%;"></div>
            <div id="btn-next" class="hitbox circle" style="left: 16.9%; top: 6.7%;"></div>
            <div id="btn-play" class="hitbox circle" style="left: 16.9%; top: 32.1%;"></div>
            <div id="btn-stop" class="hitbox circle" style="left: 16.9%; top: 44.9%;"></div>
            <div id="btn-open-bios" class="hitbox circle" style="left: 79.2%; top: 64.8%;"></div>
            <div id="btn-open" class="hitbox circle" style="left: 79.2%; top: 76.5%;"></div>
        </div>
    </div>

    <div id="visualizer-overlay" class="hidden">
        <canvas id="viz-canvas"></canvas>
        <div id="btn-exit-viz">Back to Player</div>
    </div>

    <audio id="audio-engine" playsinline preload="auto"></audio>

    <script src="emulator-core/wasmpsx.min.js"></script>
    <script src="player.js"></script>
</body>
</html>
