<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSX CD Player - PS5 Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="youtube-engine" style="position: fixed; bottom: 10px; right: 10px; width: 64px; height: 36px; z-index: 1000; opacity: 0.5; background: #000; transition: all 0.5s ease-in-out;"></div>

    <div id="start-overlay" style="z-index: 99999; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: flex; align-items: center; justify-content: center; cursor: pointer;">
        <div id="start-button" style="color: white; font-family: sans-serif; font-size: 24px; border: 2px solid white; padding: 20px;">Click/Tap to Power On PSX</div>
    </div>

    <div class="ps1-wrapper" id="main-ui">
        <div class="scaling-container">
            <img src="PSXPLAYER.png" class="background" alt="PSX UI">
            
            <div id="btn-next" class="hitbox circle" style="left: 23%; top: 7.5%;"></div>
            <div id="btn-ff" class="hitbox circle" style="left: 23%; top: 22.5%;"></div>
            <div id="btn-play" class="hitbox circle" style="left: 23%; top: 35.5%;"></div>
            <div id="btn-stop" class="hitbox circle" style="left: 23%; top: 49.5%;"></div>
            <div id="btn-pause" class="hitbox circle" style="left: 23%; top: 62.5%;"></div>
            <div id="btn-rw" class="hitbox circle" style="left: 23%; top: 76.5%;"></div>
            <div id="btn-prev" class="hitbox circle" style="left: 23%; top: 89.5%;"></div>

            <div id="btn-viz-toggle" class="hitbox circle" style="left: 44.5%; top: 21.5%;"></div>
            <div id="btn-open-bios" class="hitbox circle" style="left: 81%; top: 67%;"></div>
            <div id="btn-open" class="hitbox circle" style="left: 81%; top: 80.5%;"></div>
        </div>
    </div>

    <div id="visualizer-overlay" class="hidden" style="z-index: 2000; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
        <div id="btn-exit-viz" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; background: rgba(0,0,0,0.7); color: white; border: 1px solid white; pointer-events: auto; cursor: pointer;">Back to Player</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="player.js"></script>
</body>
</html>
